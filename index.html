<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowLife - Prenatal Intelligence</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/startbootstrap-sb-admin-2@4.1.4/css/sb-admin-2.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="prenatal.css">
</head>
<body id="page-top">

    <div id="wrapper">
        <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
            <a class="sidebar-brand d-flex align-items-center justify-content-center" href="#">
                <div class="sidebar-brand-text mx-3">GrowLife</div>
            </a>
            <hr class="sidebar-divider my-0">
            <li class="nav-item active">
                <a class="nav-link" href="#"><i class="fas fa-fw fa-baby"></i><span>Prenatal</span></a>
            </li>
        </ul>

        <div id="content-wrapper" class="d-flex flex-column">
            <div id="content">
                <br>
                <div class="container-fluid">
                    <h1 class="h3 mb-4 text-gray-800">Prenatal Intelligence</h1>

                    <div class="row">
                        <div class="col-xl-8 col-lg-7">
                            <div class="card shadow mb-4">
                                <div class="card-header py-3 bg-success text-white">
                                    <h6 class="m-0 font-weight-bold">Kalender Perkembangan Janin (Mingguan)</h6>
                                </div>
                                <div class="card-body">
                                    <div class="form-group">
                                        <label>Pilih Minggu Kehamilan:</label>
                                        <select class="form-control" id="weekSelector" onchange="updateFetalInfo()"></select>
                                    </div>
                                    <div id="fetalDisplay" class="text-center p-3">
                                        <h4 id="fetalTitle" class="text-success">Minggu 1</h4>
                                        <p id="fetalDesc">Deskripsi perkembangan akan muncul di sini.</p>
                                        <div class="badge badge-info p-2" id="fetalSize">Ukuran: Sebesar biji wijen</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-xl-4 col-lg-5">
                            <div class="card shadow mb-4">
                                <div class="card-header py-3">
                                    <h6 class="m-0 font-weight-bold text-primary">Kalkulator Nutrisi Harian</h6>
                                </div>
                                <div class="card-body">
                                    <div class="mb-3">
                                        <label>Asam Folat (mcg)</label>
                                        <div class="progress mb-2">
                                            <div id="folicBar" class="progress-bar bg-info" role="progressbar" style="width: 0%"></div>
                                        </div>
                                        <small id="folicStatus">0 / 600 mcg</small>
                                    </div>
                                    <div class="mb-3">
                                        <label>Zat Besi (mg)</label>
                                        <div class="progress mb-2">
                                            <div id="ironBar" class="progress-bar bg-warning" role="progressbar" style="width: 0%"></div>
                                        </div>
                                        <small id="ironStatus">0 / 27 mg</small>
                                    </div>
                                    <button class="btn btn-sm btn-outline-primary btn-block" onclick="addNutrition()">Tambah Konsumsi</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-12">
                            <div class="card shadow mb-4">
                                <div class="card-header py-3">
                                    <h6 class="m-0 font-weight-bold text-danger">Screening Risiko (Hipertensi & Diabetes)</h6>
                                </div>
                                <div class="card-body">
                                    <form id="riskForm">
                                        <div class="row">
                                            <div class="col-md-6">
                                                <label>Tekanan Darah Sistolik (mmHg)</label>
                                                <input type="number" id="systolic" class="form-control mb-2" placeholder="Contoh: 120">
                                            </div>
                                            <div class="col-md-6">
                                                <label>Gula Darah Sewaktu (mg/dL)</label>
                                                <input type="number" id="glucose" class="form-control mb-2" placeholder="Contoh: 100">
                                            </div>
                                        </div>
                                        <button type="button" class="btn btn-danger mt-3" onclick="checkRisk()">Cek Risiko</button>
                                    </form>
                                    <div id="riskResult" class="mt-3 d-none"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="prenatal.js"></script>
</body>
</html>
