<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowLife - Prenatal Intelligence</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>GrowLife</h1>
        <p>Prenatal Intelligence Module</p>
    </header>

    <div class="grid">
        <div class="card">
            <div class="card-title"><i class="fas fa-calendar-alt"></i> Perkembangan Janin</div>
            <label>Minggu Kehamilan:</label>
            <select id="weekSelector" onchange="updateFetalInfo()"></select>
            
            <div id="fetalDisplay">
                <h3 id="fetalTitle" style="margin-top:0;">Minggu 1</h3>
                <p id="fetalDesc">Selamat! Perjalanan luar biasa dimulai.</p>
                <span class="badge-size" id="fetalSize">Ukuran: Mikroskopis</span>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-utensils"></i> Kalkulator Nutrisi</div>
            
            <div class="progress-container">
                <small>Asam Folat: <span id="folicStatus">0/600</span> mcg</small>
                <div class="progress-bg"><div id="folicBar" class="progress-fill bg-folic"></div></div>
            </div>
            
            <div class="progress-container">
                <small>Zat Besi: <span id="ironStatus">0/27</span> mg</small>
                <div class="progress-bg"><div id="ironBar" class="progress-fill bg-iron"></div></div>
            </div>
            
            <button onclick="addNutrition()">+ Catat Konsumsi</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-heartbeat"></i> Deteksi Dini Risiko</div>
        <div class="grid-inputs">
            <div>
                <small>Sistolik (mmHg)</small>
                <input type="number" id="systolic" placeholder="120">
            </div>
            <div>
                <small>Gula Darah (mg/dL)</small>
                <input type="number" id="glucose" placeholder="100">
            </div>
        </div>
        <button class="btn-risk" onclick="checkRisk()">Cek Kondisi Sekarang</button>
        <div id="riskResult"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
